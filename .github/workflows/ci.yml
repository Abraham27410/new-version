name: Docker Hub Push and Server Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  build-push-deploy:
    name: Build Docker Image, Push to Hub, Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download Abraham's repository code into the runner
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Set up the Docker Build engine inside the GitHub runner
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Log into Abraham's personal Docker Hub account using his saved secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # Step 4: Build his Dockerfile and push it live to his Docker Hub repository
      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/vuna-calculator:latest

      # Step 5: Securely connect to Abraham's restricted VPS folder over SSH
      - name: Execute Remote SSH Pull
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            # Safely clear out any old files in his server folder
            find public_html/ -mindepth 1 -delete
            
            # Pull his exact new-version repository directly into his webroot
            git clone https://github.com/Abraham27410/new-version public_html/